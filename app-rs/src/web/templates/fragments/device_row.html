<tr id="dev-{{ '%08x' | format(device.sender_id) }}">
  <td class="col-sender"><code>{{ fmt_sender(device.sender_id) }}</code></td>
  <td><code>{{ device.eep }}</code></td>
  <td>{{ device.label }}</td>
  <td class="col-time">
    {% if device.last_seen %}{{ device.last_seen.strftime("%Y-%m-%d %H:%M:%S") }}{% else %}<span class="muted">never</span>{% endif %}
  </td>
  <td class="right">
    <a class="btn" href="/devices/{{ fmt_sender(device.sender_id) }}">inspect →</a>
    <button class="danger"
            hx-delete="/devices/{{ fmt_sender(device.sender_id) }}"
            hx-target="closest tr"
            hx-swap="outerHTML"
            hx-confirm="Remove {{ device.label }}?">×</button>
  </td>
</tr>
