# Cross-build the BBB image (linux/arm/v7) on GitHub-hosted runners and push
# to ghcr.io/<owner>/vdsensor. Runs on every push to main, on git tags, and
# manually via "Run workflow".
#
# Auth uses the runner's built-in GITHUB_TOKEN — no PAT, no secrets to manage.
#
# Tagging:
#   - main branch       → :latest, :sha-XXXXXXX
#   - v* git tag        → :vX.Y.Z, :sha-XXXXXXX
#   - workflow_dispatch → :sha-XXXXXXX (no :latest unless on main)

name: build-and-push

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/build-and-push.yml"
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/vdsensor

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/pyproject.toml
      - name: Install + lint + test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          ruff check src tests
          pytest -q

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: ./app
          file: ./app/Dockerfile
          platforms: linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
