{% extends "base.html" %}
{% block title %}vdsensor — pair{% endblock %}
{% block main %}
<section class="card">
  <h2>Pair a new device</h2>
  <p id="pair-status">state: <code>{{ state }}</code></p>

  <form id="pair-start-form">
    <label>timeout (ms)
      <input name="timeout_ms" type="number" value="60000" min="1000" max="600000">
    </label>
    <button type="submit">Start learn mode</button>
    <button id="pair-cancel" type="button">Cancel</button>
  </form>

  <h3>Candidates</h3>
  <table id="candidates">
    <thead><tr><th>Sender</th><th>RORG</th><th>RSSI</th><th>Payload</th><th>Action</th></tr></thead>
    <tbody></tbody>
  </table>

  <template id="assign-template">
    <form class="assign-form">
      <input type="hidden" name="sender_id">
      <input name="label" placeholder="label (e.g. Office)" required>
      <select name="eep" required>
        {% for p in profiles %}
        <option value="{{ p.profile_id }}">{{ p.profile_id }} — {{ p.label }}</option>
        {% endfor %}
      </select>
      <button type="submit">Pair</button>
    </form>
  </template>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/pair.js"></script>
{% endblock %}
