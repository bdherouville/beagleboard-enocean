# Lives on the BBB at /opt/vdsensor/docker-compose.yml.
# `docker compose pull && docker compose up -d` after a release is the whole
# deploy story. The host (BBB) is responsible for UART4 pinmux — see
# docs/BBB-pinmux.md.

services:
  vdsensor:
    image: ghcr.io/${GHCR_USER:-CHANGE-ME}/vdsensor:${TAG:-latest}
    pull_policy: always
    restart: unless-stopped              # supervises the process; replaces the legacy Java Agent
    devices:
      - "/dev/ttyS4:/dev/ttyS4"
    group_add:
      # 'dialout' GID on the BBB's Debian image. Verify with
      # `getent group dialout` on the target; some images use 18.
      - "20"
    environment:
      VDSENSOR_SERIAL_PORT: ${VDSENSOR_SERIAL_PORT:-/dev/ttyS4}
      VDSENSOR_SERIAL_BAUD: "57600"
      VDSENSOR_DB_PATH: /data/vdsensor.db
      VDSENSOR_HTTP_HOST: "0.0.0.0"
      VDSENSOR_HTTP_PORT: "8080"
      VDSENSOR_TELEGRAM_RING_SIZE: "10000"
      VDSENSOR_MQTT_URL: ${VDSENSOR_MQTT_URL:-}
      VDSENSOR_MQTT_PREFIX: ${VDSENSOR_MQTT_PREFIX:-vdsensor}
      VDSENSOR_HA_DISCOVERY_PREFIX: ${VDSENSOR_HA_DISCOVERY_PREFIX:-homeassistant}
      TZ: ${TZ:-Europe/Paris}
    volumes:
      - vdsensor_data:/data
    ports:
      - "8080:8080"

volumes:
  vdsensor_data:
